name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 || true
          # 如果失败，直接输出来确认
          echo "=== Exit code: $? ==="

      - name: Show full error
        if: failure()
        working-directory: ./android
        run: |
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          find app/build/reports -name "*.txt" -exec cat {} \; 2>/dev/null || echo "No reports"

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: FilmStore-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
